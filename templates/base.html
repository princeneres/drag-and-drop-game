<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='imgs/favicon.ico') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style/main.css') }}" />
    <title>{% block title %}Jogo de Associação{% endblock %}</title>
  </head>
  <body>
    <nav class="nav">
      <a class="brand" href="/">
        <span class="logo">🧩</span>
        <span>Associa<span class="accent">!</span></span>
      </a>
      <div class="nav-links">
        <a href="/" class="{{ 'active' if request.path == '/' }}">Temas</a>
        <a href="/formulario/novo" class="{{ 'active' if '/formulario' in request.path }}">Criar tema</a>
        <a href="/sobre" class="{{ 'active' if request.path == '/sobre' }}">Sobre</a>
      </div>
    </nav>

    <main class="container">{% block content %}{% endblock content %}</main>

    <div class="toasts" id="toasts"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock scripts %}
  </body>
</html>
