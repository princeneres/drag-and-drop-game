{% extends 'base.html' %} {% block title %}Editar {{ tema.name }} — Associa!{% endblock %}
{% block content %}
<div class="page-head">
  <h1>Editar <span class="accent">tema</span> ✏️</h1>
  <p>Ajuste o que quiser e salve as mudanças.</p>
</div>

<div class="card-panel" id="theme-form" data-mode="edit" data-id="{{ tema._id }}">
  <div class="field">
    <label for="name">Nome do tema</label>
    <input id="name" class="input" value="{{ tema.name }}" />
  </div>

  <div class="field">
    <label for="description">Descrição</label>
    <textarea id="description" class="input">{{ tema.description }}</textarea>
  </div>

  <div class="field">
    <label class="switch">
      <input type="checkbox" id="private" {{ 'checked' if tema.private }} />
      <span class="track"></span>
      <span>Tema privado (com senha)</span>
    </label>
    <div id="password-wrap" class="{{ '' if tema.private else 'hide' }}" style="margin-top: 0.8rem">
      <input type="password" id="password" class="input" placeholder="Deixe em branco para manter a senha atual" />
    </div>
  </div>

  <hr class="soft" />

  <label>Categorias e itens 🧩</label>
  <p class="hint">Entre 2 e 10 categorias, cada uma com pelo menos 1 item.</p>
  <div id="categories"></div>
  <button type="button" class="btn btn-primary" id="add-category">＋ Adicionar categoria</button>

  <hr class="soft" />
  <button type="button" class="btn btn-success btn-lg" id="save-theme">💾 Salvar alterações</button>
</div>
{% endblock content %} {% block scripts %}
<script>
  window.THEME_DATA = {{ tema.categories | tojson }};
</script>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/form.js') }}"></script>
{% endblock scripts %}
